name: CI-CD

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-train-build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mlops-project
    env:
      PYTHONPATH: .
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db
      MODEL_NAME: customer-churn-classifier
      LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests -q

      - name: Train and register model
        run: python src/train.py

      - name: Evaluate production model
        run: python src/evaluate.py

      - name: Generate drift report
        run: python monitoring/drift.py --output-dir reports/drift

      - name: Build Docker image
        run: docker build -t customer-churn-api:latest .

      - name: Push image (mock)
        run: echo "Mock push step. Replace with docker login and docker push in your target registry."

      - name: Deploy API locally for smoke test
        run: |
          docker run -d --name churn-api-smoke -p 8000:8000 -e MLFLOW_TRACKING_URI=sqlite:////app/mlflow.db customer-churn-api:latest
          sleep 15
          curl --fail http://127.0.0.1:8000/health
          docker stop churn-api-smoke
