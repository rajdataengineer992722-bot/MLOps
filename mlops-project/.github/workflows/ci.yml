name: CI-CD

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-test-train:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db
      MODEL_NAME: breast-cancer-classifier

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r mlops-project/requirements.txt

      - name: Run unit tests
        run: pytest mlops-project/tests -q

      - name: Train and register model
        run: |
          export PYTHONPATH=mlops-project
          python mlops-project/src/train.py

      - name: Generate drift report
        run: |
          export PYTHONPATH=mlops-project
          python mlops-project/monitoring/drift.py --output-dir mlops-project/reports/drift

      - name: Build Docker image
        run: docker build -t mlops-api:latest mlops-project

      - name: Push image (mock)
        run: |
          echo "Mock push step - tag and push to registry in real environment"

      - name: Deploy API (mock)
        run: |
          echo "Mock deploy step - replace with kubectl/terraform/ecs deploy commands"
